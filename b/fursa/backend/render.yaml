# render.yaml
# Deploy the backend to Render.com
# Put this file in the ROOT of your repository

services:
  - type: web
    name: fursa-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: fursa-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true      # Render generates a random secret for you
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://your-frontend.vercel.app   # Change this
      - key: MAX_FILE_SIZE_MB
        value: "5"
    healthCheckPath: /health

databases:
  - name: fursa-db
    databaseName: fursa
    user: fursa_user
    plan: free
